<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PropaneDriver</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="PropaneDriver.Client.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        window.getDeviceLocation = function () {
            return new Promise(function (resolve, reject) {
                if (!navigator.geolocation) {
                    reject("Geolocation is not supported by this browser.");
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    function (position) {
                        resolve([position.coords.latitude, position.coords.longitude]);
                    },
                    function (error) {
                        switch (error.code) {
                            case error.PERMISSION_DENIED:
                                reject("Location permission denied.");
                                break;
                            case error.POSITION_UNAVAILABLE:
                                reject("Location information unavailable.");
                                break;
                            case error.TIMEOUT:
                                reject("Location request timed out.");
                                break;
                            default:
                                reject("An unknown error occurred.");
                                break;
                        }
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            });
        };

        // GPS watch position for geofence monitoring
        window._geoWatchId = null;

        window.startWatchingPosition = function (dotNetRef) {
            if (!navigator.geolocation) {
                dotNetRef.invokeMethodAsync('OnPositionError', 'Geolocation is not supported.');
                return;
            }
            if (window._geoWatchId !== null) {
                navigator.geolocation.clearWatch(window._geoWatchId);
            }
            window._geoWatchId = navigator.geolocation.watchPosition(
                function (position) {
                    dotNetRef.invokeMethodAsync('OnPositionUpdate',
                        position.coords.latitude,
                        position.coords.longitude,
                        position.coords.accuracy);
                },
                function (error) {
                    dotNetRef.invokeMethodAsync('OnPositionError', error.message);
                },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );
        };

        window.stopWatchingPosition = function () {
            if (window._geoWatchId !== null) {
                navigator.geolocation.clearWatch(window._geoWatchId);
                window._geoWatchId = null;
            }
        };
    </script>
</body>

</html>
