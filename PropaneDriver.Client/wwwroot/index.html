<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PropaneDriver</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="PropaneDriver.Client.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        // GPS watch position for geofence monitoring
        window._geoWatchId = null;

        window.startWatchingPosition = function (dotNetRef) {
            if (!navigator.geolocation) {
                dotNetRef.invokeMethodAsync('OnPositionError', 'Geolocation is not supported.');
                return;
            }
            if (window._geoWatchId !== null) {
                navigator.geolocation.clearWatch(window._geoWatchId);
            }
            window._geoWatchId = navigator.geolocation.watchPosition(
                function (position) {
                    dotNetRef.invokeMethodAsync('OnPositionUpdate',
                        position.coords.latitude,
                        position.coords.longitude,
                        position.coords.accuracy);
                },
                function (error) {
                    dotNetRef.invokeMethodAsync('OnPositionError', error.message);
                },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );
        };

        window.stopWatchingPosition = function () {
            if (window._geoWatchId !== null) {
                navigator.geolocation.clearWatch(window._geoWatchId);
                window._geoWatchId = null;
            }
        };

        window.scrollToElement = function (id) {
            var el = document.getElementById(id);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        };

        // ===== Google Maps interop =====
        window._navMap = null;
        window._navDriverMarker = null;
        window._navDirectionsService = null;
        window._navDirectionsRenderer = null;
        window._googleMapsLoadPromise = null;

        // Lazy-load the Google Maps JS API. The key is fetched from the server
        // on first use (referrer-restricted, so exposure is fine). Resolves
        // once `google.maps` is ready to use.
        window._ensureGoogleMapsLoaded = function () {
            if (window.google && window.google.maps) {
                return Promise.resolve();
            }
            if (window._googleMapsLoadPromise) {
                return window._googleMapsLoadPromise;
            }
            window._googleMapsLoadPromise = fetch('/api/config/maps-key')
                .then(function (r) {
                    if (!r.ok) throw new Error('Failed to fetch maps key: ' + r.status);
                    return r.json();
                })
                .then(function (data) {
                    return new Promise(function (resolve, reject) {
                        window.__googleMapsReady = function () { resolve(); };
                        var s = document.createElement('script');
                        s.src = 'https://maps.googleapis.com/maps/api/js?key='
                            + encodeURIComponent(data.key)
                            + '&loading=async&callback=__googleMapsReady';
                        s.async = true;
                        s.defer = true;
                        s.onerror = function () { reject(new Error('Google Maps script failed to load.')); };
                        document.head.appendChild(s);
                    });
                });
            return window._googleMapsLoadPromise;
        };

        window.navMapInit = async function (elementId, lat, lon, zoom) {
            try {
                await window._ensureGoogleMapsLoaded();
            } catch (e) {
                console.error('[navMapInit] Google Maps failed to load:', e);
                throw e;
            }

            var el = document.getElementById(elementId);
            if (!el) {
                console.error('[navMapInit] Element not found:', elementId);
                return;
            }

            // Wait for the container to actually have dimensions before
            // constructing the map. Flex layout + percentage heights can
            // leave the element at 0 height on the first animation frame.
            await new Promise(function (resolve) {
                var tries = 0;
                function check() {
                    var r = el.getBoundingClientRect();
                    if ((r.width >= 10 && r.height >= 10) || tries > 60) {
                        resolve();
                    } else {
                        tries++;
                        requestAnimationFrame(check);
                    }
                }
                check();
            });

            var rect = el.getBoundingClientRect();
            console.log('[navMapInit] container size:', rect.width, 'x', rect.height);
            if (rect.height < 10 || rect.width < 10) {
                console.warn('[navMapInit] map container still has near-zero size after waiting; tiles may not render.');
            }

            var center = { lat: lat, lng: lon };
            window._navMap = new google.maps.Map(el, {
                center: center,
                zoom: zoom,
                mapTypeControl: false,
                streetViewControl: false,
                fullscreenControl: false
            });

            window._navDriverMarker = new google.maps.Marker({
                position: center,
                map: window._navMap,
                title: 'You',
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 9,
                    fillColor: '#3b82f6',
                    fillOpacity: 1,
                    strokeColor: '#1e3a5f',
                    strokeWeight: 2
                }
            });

            window._navDirectionsService = new google.maps.DirectionsService();
            window._navDirectionsRenderer = new google.maps.DirectionsRenderer({
                map: window._navMap,
                suppressMarkers: false,
                preserveViewport: false,
                polylineOptions: {
                    strokeColor: '#4a6cf7',
                    strokeWeight: 5,
                    strokeOpacity: 0.85
                }
            });

            // Re-trigger a resize pass once the map is idle in case the
            // container grew between Map construction and tile fetch.
            google.maps.event.addListenerOnce(window._navMap, 'idle', function () {
                google.maps.event.trigger(window._navMap, 'resize');
                window._navMap.setCenter(center);
            });

            // Also re-trigger resize when the viewport changes (mobile rotate,
            // browser resize, DevTools opening) so tiles re-fill the area.
            window.addEventListener('resize', function () {
                if (window._navMap) {
                    google.maps.event.trigger(window._navMap, 'resize');
                }
            });

            console.log('[navMapInit] map created at', lat, lon);
        };

        window.navMapUpdateDriver = function (lat, lon) {
            if (!window._navMap || !window._navDriverMarker) return;
            var pos = { lat: lat, lng: lon };
            window._navDriverMarker.setPosition(pos);
            var bounds = window._navMap.getBounds();
            if (bounds && !bounds.contains(pos)) {
                window._navMap.panTo(pos);
            }
        };

        window.navMapCenterOnDriver = function () {
            if (!window._navMap || !window._navDriverMarker) return;
            window._navMap.panTo(window._navDriverMarker.getPosition());
        };

        // No-op kept for backwards compatibility; Google DirectionsRenderer
        // plants its own destination marker when a route is drawn.
        window.navMapSetDestination = function (lat, lon, label) {
            return;
        };

        // Route from (originLat, originLon) to a destination address string.
        // DirectionsService geocodes the destination internally, so we don't
        // need a separate geocoding step on the client for navigation.
        window.navMapDrawRoute = function (originLat, originLon, destinationAddress) {
            return new Promise(function (resolve, reject) {
                if (!window._navDirectionsService || !window._navDirectionsRenderer) {
                    console.error('[navMapDrawRoute] Map not initialized. service=',
                        !!window._navDirectionsService, 'renderer=', !!window._navDirectionsRenderer);
                    reject(new Error('Map not initialized.'));
                    return;
                }
                console.log('[navMapDrawRoute] requesting route', originLat, originLon, '->', destinationAddress);
                window._navDirectionsService.route({
                    origin: { lat: originLat, lng: originLon },
                    destination: destinationAddress,
                    travelMode: google.maps.TravelMode.DRIVING,
                    region: 'us'
                }, function (result, status) {
                    if (status !== 'OK' || !result || !result.routes || result.routes.length === 0) {
                        console.error('[navMapDrawRoute] Directions failed:', status);
                        reject(new Error('Directions failed: ' + status));
                        return;
                    }
                    try {
                        // Make sure the renderer is still attached to the map,
                        // then feed it the directions result.
                        window._navDirectionsRenderer.setMap(window._navMap);
                        window._navDirectionsRenderer.setDirections(result);

                        // Explicitly fit the map to the route bounds; the
                        // renderer normally does this but can skip it if the
                        // container size was wrong at init time.
                        var route = result.routes[0];
                        if (route.bounds && window._navMap) {
                            window._navMap.fitBounds(route.bounds);
                        }

                        // Force a tile re-layout in case the container size
                        // has changed since init.
                        google.maps.event.trigger(window._navMap, 'resize');

                        var leg = route.legs[0];
                        console.log('[navMapDrawRoute] rendered route',
                            leg.distance && leg.distance.text,
                            leg.duration && leg.duration.text);
                        resolve({
                            distanceMeters: leg.distance ? leg.distance.value : 0,
                            durationSeconds: leg.duration ? leg.duration.value : 0,
                            destinationAddress: leg.end_address || destinationAddress
                        });
                    } catch (err) {
                        console.error('[navMapDrawRoute] error rendering directions:', err);
                        reject(err);
                    }
                });
            });
        };

        window.navMapDestroy = function () {
            if (window._navDirectionsRenderer) {
                window._navDirectionsRenderer.setMap(null);
                window._navDirectionsRenderer = null;
            }
            if (window._navDriverMarker) {
                window._navDriverMarker.setMap(null);
                window._navDriverMarker = null;
            }
            window._navDirectionsService = null;
            window._navMap = null;
        };
    </script>
</body>

</html>
