<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PropaneDriver</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="PropaneDriver.Client.styles.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        window.getDeviceLocation = function () {
            return new Promise(function (resolve, reject) {
                if (!navigator.geolocation) {
                    reject("Geolocation is not supported by this browser.");
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    function (position) {
                        resolve([position.coords.latitude, position.coords.longitude]);
                    },
                    function (error) {
                        switch (error.code) {
                            case error.PERMISSION_DENIED:
                                reject("Location permission denied.");
                                break;
                            case error.POSITION_UNAVAILABLE:
                                reject("Location information unavailable.");
                                break;
                            case error.TIMEOUT:
                                reject("Location request timed out.");
                                break;
                            default:
                                reject("An unknown error occurred.");
                                break;
                        }
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            });
        };

        // GPS watch position for geofence monitoring
        window._geoWatchId = null;

        window.startWatchingPosition = function (dotNetRef) {
            if (!navigator.geolocation) {
                dotNetRef.invokeMethodAsync('OnPositionError', 'Geolocation is not supported.');
                return;
            }
            if (window._geoWatchId !== null) {
                navigator.geolocation.clearWatch(window._geoWatchId);
            }
            window._geoWatchId = navigator.geolocation.watchPosition(
                function (position) {
                    dotNetRef.invokeMethodAsync('OnPositionUpdate',
                        position.coords.latitude,
                        position.coords.longitude,
                        position.coords.accuracy);
                },
                function (error) {
                    dotNetRef.invokeMethodAsync('OnPositionError', error.message);
                },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );
        };

        window.stopWatchingPosition = function () {
            if (window._geoWatchId !== null) {
                navigator.geolocation.clearWatch(window._geoWatchId);
                window._geoWatchId = null;
            }
        };

        window.scrollToElement = function (id) {
            var el = document.getElementById(id);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        };

        // ===== Leaflet map interop =====
        window._navMap = null;
        window._navDriverMarker = null;
        window._navDestMarker = null;
        window._navRouteLine = null;

        window.navMapInit = function (elementId, lat, lon, zoom) {
            if (window._navMap) {
                window._navMap.remove();
                window._navMap = null;
            }
            var map = L.map(elementId).setView([lat, lon], zoom);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(map);
            window._navMap = map;

            // driver marker (blue circle)
            window._navDriverMarker = L.circleMarker([lat, lon], {
                radius: 10, fillColor: '#3b82f6', fillOpacity: 1,
                color: '#1e3a5f', weight: 2
            }).addTo(map).bindPopup('You');
        };

        window.navMapUpdateDriver = function (lat, lon) {
            if (!window._navMap || !window._navDriverMarker) return;
            var latlng = L.latLng(lat, lon);
            window._navDriverMarker.setLatLng(latlng);
            window._navMap.panTo(latlng);
        };

        window.navMapSetDestination = function (lat, lon, label) {
            if (!window._navMap) return;
            if (window._navDestMarker) {
                window._navMap.removeLayer(window._navDestMarker);
            }
            window._navDestMarker = L.marker([lat, lon])
                .addTo(window._navMap)
                .bindPopup(label || 'Destination');
        };

        window.navMapDrawRoute = function (coordPairs) {
            if (!window._navMap) return;
            if (window._navRouteLine) {
                window._navMap.removeLayer(window._navRouteLine);
            }
            var latlngs = coordPairs.map(function (c) { return [c[0], c[1]]; });
            window._navRouteLine = L.polyline(latlngs, {
                color: '#4a6cf7', weight: 5, opacity: 0.8
            }).addTo(window._navMap);

            // Fit the map to show the full route
            var group = L.featureGroup([window._navRouteLine]);
            if (window._navDriverMarker) group.addLayer(window._navDriverMarker);
            if (window._navDestMarker) group.addLayer(window._navDestMarker);
            window._navMap.fitBounds(group.getBounds().pad(0.1));
        };

        window.navMapDestroy = function () {
            if (window._navMap) {
                window._navMap.remove();
                window._navMap = null;
                window._navDriverMarker = null;
                window._navDestMarker = null;
                window._navRouteLine = null;
            }
        };
    </script>
</body>

</html>
