name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_NAME: propanedrivercontainer         # ACR resource name (no .azurecr.io)
  AZURE_WEBAPP_NAME: propane-driver-app    # the new Linux container web app
  RESOURCE_GROUP: rg-data-drive            # resource group for the web app
  SITECONTAINER_NAME: main                 # the main sitecontainer to update

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Compute version tags
        id: version
        run: |
          SEMVER=$(cat VERSION | tr -d '[:space:]')
          SHORT_SHA=${GITHUB_SHA:0:7}
          FULL="${SEMVER}-${GITHUB_RUN_ID}-${SHORT_SHA}"
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"
          echo "full=$FULL" >> "$GITHUB_OUTPUT"

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push image
        run: |
          REPO=${{ env.ACR_NAME }}.azurecr.io/propanedriver
          docker build -t "$REPO:${{ steps.version.outputs.full }}" -t "$REPO:${{ steps.version.outputs.semver }}" .
          docker push "$REPO:${{ steps.version.outputs.full }}"
          docker push "$REPO:${{ steps.version.outputs.semver }}"

      # The app uses the Linux "sitecontainers" model, so the running image is
      # updated on the main sitecontainer (not via webapps-deploy, which only
      # writes the classic single-container config). --system-assigned-identity
      # makes the app pull from ACR with its managed identity (AcrPull granted),
      # so no registry admin credentials are needed.
      - name: Deploy image to sitecontainer
        run: |
          az webapp sitecontainers update \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --container-name ${{ env.SITECONTAINER_NAME }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/propanedriver:${{ steps.version.outputs.full }} \
            --system-assigned-identity true
